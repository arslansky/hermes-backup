model:
  default: Kimi-K2_6
  provider: kimi-coding
command_allowlist:
  - recursive delete
  - hermes update (restarts gateway, kills running agents)
  - delete in root path
  - in-place edit of Hermes config/env
  - overwrite system file via redirection
  - shell execution via heredoc
  - kill hermes/gateway process (self-termination)
  - stop/restart system service
  - sudo with combined-flag privilege escalation
  - execute_code
onboarding:
  seen:
    profile_build_offered: true
    busy_input_prompt: true
_config_version: 33
fallback_model:
  provider: openai
  model: deepseek-v4-pro
  base_url: https://yuanyuaicloud.cn/v1
  key_env: OPENAI_API_KEY

# ── Security ──────────────────────────────────────────────────────────
# Secret redaction is ON by default — strings that look like API keys,
# tokens, and passwords are masked in tool output, logs, and chat
# responses before the model or user ever sees them. Set redact_secrets
# to false to disable (e.g. when developing the redactor itself).
# tirith pre-exec scanning is enabled by default when the tirith binary
# is available. Configure via security.tirith_* keys or env vars
# (TIRITH_ENABLED, TIRITH_BIN, TIRITH_TIMEOUT, TIRITH_FAIL_OPEN).
#
# security:
#   redact_secrets: true
#   tirith_enabled: true
#   tirith_path: "tirith"
#   tirith_timeout: 5
#   tirith_fail_open: true
